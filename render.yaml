services:
  # 1. Backend API Service
  - type: web
    name: event-hub-api
    env: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: "7d"
      - key: CLIENT_URL
        value: "https://event-hub.onrender.com"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: MAX_FILE_SIZE
        value: "5242880"

  # 2. Frontend Next.js Service
  - type: web
    name: event-hub
    env: node
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_BACKEND_URL
        value: "https://event-hub-api.onrender.com"
